services:
  postgres:
    image: postgres:15-alpine
    container_name: servcand_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-servcand}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servcand@2024}
      POSTGRES_DB: ${POSTGRES_DB:-servcand_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-servcand} -d ${POSTGRES_DB:-servcand_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servcand_network

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: development
    container_name: servcand_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-servcand}:${POSTGRES_PASSWORD:-servcand@2024}@postgres:5432/${POSTGRES_DB:-servcand_db}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh-secret-key}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-servcand-webhook-token}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
    ports:
      - '3000:3000'
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - servcand_network
    command: >
      sh -c "echo 'Waiting for database...' &&
             sleep 3 &&
             npx prisma db push --accept-data-loss &&
             npx prisma db seed &&
             npm run start:dev"

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      target: development
    container_name: servcand_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - '5173:5173'
    volumes:
      - ./packages/frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - servcand_network

volumes:
  postgres_data:
    driver: local

networks:
  servcand_network:
    driver: bridge
